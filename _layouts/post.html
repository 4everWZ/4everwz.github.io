---
layout: default
---
<article class="content-page post-page">
  <header class="page-header">
    <p class="page-eyebrow">Writing</p>
    <h1 class="page-title">{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
  </header>

  <div class="page-content">
    {{ content }}
  </div>
</article>
